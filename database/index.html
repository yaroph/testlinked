<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BNI LINKED // DATABASE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="app-container">
    <header class="top-bar">
      <div class="logo-area">
        <img src="../point/logo-bni-linked.png" alt="BNI Linked" class="app-logo">
        <div class="titles">
          <h1 class="main-title">SYSTEM DATABASE</h1>
          <span class="sub-title">ARCHIVES CLOUD ET BOARDS</span>
        </div>
      </div>

      <nav class="main-nav">
        <a href="../point/" class="nav-btn">RESEAU</a>
        <a href="../map/" class="nav-btn">CARTE</a>
      </nav>
    </header>

    <main class="content-panel">
      <div class="tabs-container">
        <button class="tab-btn active" data-tab="point">Archives Point</button>
        <button class="tab-btn" data-tab="map">Archives Map</button>
        <button class="tab-btn" data-tab="boards">Boards</button>
      </div>

      <div class="status-bar">
        <span class="status-indicator"></span>
        <span id="global-status">Systeme pret.</span>
      </div>

      <section class="toolbar" aria-label="Filtres">
        <label class="toolbar-search">
          <span>Recherche</span>
          <input id="toolbar-search" type="search" placeholder="Nom du board, owner, user, action..." autocomplete="off" />
        </label>

        <label class="toolbar-select" id="toolbar-action-wrap">
          <span>Type</span>
          <select id="toolbar-action-filter">
            <option value="all">Tous</option>
            <option value="export">Exports</option>
            <option value="import">Imports</option>
          </select>
        </label>

        <button id="toolbar-refresh" class="btn-cyber btn-toolbar" type="button">Rafraichir</button>
      </section>

      <div class="toolbar-meta" id="toolbar-meta">Aucun filtre actif.</div>

      <section id="panel-point" class="panel active">
        <div class="panel-header-row">
          <h3>ARCHIVES RESEAU</h3>
          <div class="status-text" id="status-point">Chargement...</div>
        </div>
        <div class="cards-grid cards-grid-stack" id="cards-point"></div>
        <div class="panel-footer">
          <button id="load-more-point" class="btn-cyber btn-load-more" type="button" hidden>CHARGER PLUS</button>
        </div>
      </section>

      <section id="panel-map" class="panel">
        <div class="panel-header-row">
          <h3>ARCHIVES TACTIQUES</h3>
          <div class="status-text" id="status-map">Chargement...</div>
        </div>
        <div class="cards-grid cards-grid-stack" id="cards-map"></div>
        <div class="panel-footer">
          <button id="load-more-map" class="btn-cyber btn-load-more" type="button" hidden>CHARGER PLUS</button>
        </div>
      </section>

      <section id="panel-boards" class="panel">
        <div class="panel-header-row">
          <h3>BOARDS CLOUD</h3>
          <div class="status-text" id="status-boards">Chargement...</div>
        </div>
        <div class="cards-grid" id="cards-boards"></div>
        <div class="panel-footer">
          <button id="load-more-boards" class="btn-cyber btn-load-more" type="button" hidden>CHARGER PLUS</button>
        </div>
      </section>
    </main>
  </div>

  <div id="custom-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box">
      <button id="modal-close-x" type="button" class="ui-close-x modal-close-x" aria-label="Fermer">x</button>
      <div class="modal-header" id="modal-title">TITRE</div>
      <div class="modal-body" id="modal-text">Texte de la modale...</div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="../shared/js/lock-fields.js"></script>
</body>
</html>
